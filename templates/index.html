<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg:        #0d0f12;
      --surface:   #151820;
      --panel:     #1a1f2b;
      --border:    #252c3a;
      --border-hi: #2e3a52;
      --text:      #c8d3e8;
      --text-dim:  #5a6a88;
      --text-hi:   #e8edf8;
      --accent:    #3b82f6;
      --accent-hi: #60a5fa;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    #sidebar {
      width: 340px;
      min-width: 340px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #sidebar-header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-hi);
      letter-spacing: 0.02em;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }

    .conn-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; font-family: var(--mono);
      color: var(--text-dim);
    }

    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s;
    }
    .conn-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.err { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    /* Config sections */
    #config-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }

    #config-body::-webkit-scrollbar { width: 4px; }
    #config-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .cfg-section {
      margin-bottom: 16px;
    }

    .cfg-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .cfg-row {
      margin-bottom: 9px;
    }

    .cfg-row label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
      font-family: var(--mono);
    }

    .cfg-row input, .cfg-row textarea, .cfg-row select {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-family: var(--mono);
      padding: 7px 9px;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }

    .cfg-row input:focus, .cfg-row textarea:focus {
      border-color: var(--accent);
    }

    .cfg-row textarea { min-height: 60px; }

    .cfg-row input[type="password"] {
      letter-spacing: 0.1em;
    }

    /* show/hide password toggle */
    .pwd-wrap {
      position: relative;
    }
    .pwd-wrap input { padding-right: 32px; }
    .pwd-toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 12px; padding: 2px;
      transition: color .15s;
    }
    .pwd-toggle:hover { color: var(--text); }

    .kv-editor { display: flex; flex-direction: column; gap: 5px; }
    .kv-row { display: flex; gap: 5px; }
    .kv-row input { flex: 1; }
    .kv-row button {
      background: none; border: 1px solid var(--border);
      border-radius: 5px; color: var(--text-dim); cursor: pointer;
      font-size: 14px; width: 28px; flex-shrink: 0;
      transition: all .15s;
    }
    .kv-row button:hover { border-color: var(--red); color: var(--red); }
    .kv-add-btn {
      background: none; border: 1px dashed var(--border);
      border-radius: 5px; color: var(--text-dim); cursor: pointer;
      font-size: 11px; padding: 5px; width: 100%;
      font-family: var(--mono);
      transition: all .15s;
    }
    .kv-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Sidebar footer */
    #sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      font-family: var(--sans);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hi); }

    .btn-ghost {
      background: var(--panel);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }

    /* ── MAIN CHAT ─────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .model-tag {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--accent);
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.25);
      padding: 3px 10px;
      border-radius: 12px;
    }

    .header-actions {
      display: flex; gap: 8px; align-items: center;
    }

    .icon-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-dim); cursor: pointer;
      font-size: 13px; padding: 5px 9px;
      transition: all .15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--border-hi); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg.system { align-self: center; align-items: center; max-width: 100%; }

    .msg-role {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-dim);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 10px;
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: rgba(59,130,246,.15);
      border: 1px solid rgba(59,130,246,.25);
      color: var(--text-hi);
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
      font-family: var(--mono);
      font-size: 12.5px;
    }

    .msg.system .msg-bubble {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      text-align: center;
    }

    .msg-file-preview {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; font-family: var(--mono);
      color: var(--text-dim); margin-bottom: 6px;
    }
    .msg-file-preview .file-icon { font-size: 16px; }

    /* Status / raw response toggle */
    .msg-meta {
      display: flex; gap: 8px; align-items: center;
      margin-top: 5px;
    }
    .status-chip {
      font-size: 10px; font-family: var(--mono);
      padding: 2px 7px; border-radius: 10px;
    }
    .status-chip.ok  { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .status-chip.err { background: rgba(248,113,113,.1); color: var(--red);   border: 1px solid rgba(248,113,113,.2); }
    .toggle-raw {
      font-size: 10px; font-family: var(--mono); color: var(--text-dim);
      background: none; border: none; cursor: pointer; text-decoration: underline;
    }
    .toggle-raw:hover { color: var(--accent); }

    .raw-panel {
      margin-top: 8px; display: none;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px;
      font-family: var(--mono); font-size: 11px;
      color: var(--text-dim); max-height: 300px;
      overflow-y: auto; white-space: pre-wrap;
      word-break: break-all;
    }

    /* typing indicator */
    .typing-bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; border-bottom-left-radius: 3px;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce .9s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── INPUT BAR ─────────────────────────────────── */
    #input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #attached-files {
      display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px;
    }

    .attached-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 9px;
      font-size: 11px; font-family: var(--mono); color: var(--text-dim);
    }
    .attached-chip button {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 13px; line-height: 1; transition: color .15s;
    }
    .attached-chip button:hover { color: var(--red); }

    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
    }

    #file-btn {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-dim); cursor: pointer;
      font-size: 16px; padding: 9px 11px; flex-shrink: 0;
      transition: all .15s;
    }
    #file-btn:hover { border-color: var(--accent); color: var(--accent); }
    #file-input { display: none; }

    #msg-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-hi);
      font-size: 13px;
      font-family: var(--sans);
      padding: 10px 13px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      padding: 10px 14px;
      flex-shrink: 0;
      transition: all .15s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hi); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── MODALS ─────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; display: none;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 480px; max-width: 95vw;
    }
    .modal h3 { font-size: 14px; font-weight: 600; color: var(--text-hi); margin-bottom: 14px; }

    .profiles-list {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .profile-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 13px;
      cursor: pointer; transition: border-color .15s;
    }
    .profile-item:hover { border-color: var(--accent); }
    .profile-item .pname { font-size: 13px; font-weight: 500; color: var(--text-hi); }
    .profile-item .pmodel { font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
    .profile-item .p-del {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 15px; padding: 2px 5px; border-radius: 4px; transition: all .15s;
    }
    .profile-item .p-del:hover { color: var(--red); background: rgba(248,113,113,.1); }

    .new-profile-name {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 13px;
      font-family: var(--mono); padding: 8px 11px; outline: none;
      margin-bottom: 10px;
    }
    .new-profile-name:focus { border-color: var(--accent); }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns .btn { flex: none; padding: 8px 18px; }

    /* empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--text-dim);
    }
    #empty-state .es-icon { font-size: 36px; opacity: 0.3; }
    #empty-state p { font-size: 13px; font-family: var(--mono); }

    /* scrollbar same as messages */
    #config-body::-webkit-scrollbar { width: 4px; }
    #config-body::-webkit-scrollbar-track { background: transparent; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 9px;
    }
    .toggle-row label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
    .toggle {
      position: relative; width: 34px; height: 18px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 18px;
      cursor: pointer; transition: .2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute;
      height: 12px; width: 12px; left: 3px; bottom: 3px;
      background: var(--text-dim); border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); background: #fff; }

  </style>
</head>
<body>

<!-- ── SIDEBAR ──────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <div class="brand-name">AI Gateway</div>
        <div class="brand-sub">NS · CHAT CLIENT</div>
      </div>
    </div>
    <div class="conn-badge">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">idle</span>
    </div>
  </div>

  <div id="config-body">

    <div class="cfg-section">
      <div class="cfg-section-title">Endpoint</div>
      <div class="cfg-row">
        <label>URL</label>
        <input type="text" id="cfg-endpoint" placeholder="http://host/v1/cust-openai/v1/responses" />
      </div>
      <div class="cfg-row">
        <label>Model</label>
        <input type="text" id="cfg-model" placeholder="openai.gpt-oss-20b" />
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Authentication</div>
      <div class="cfg-row">
        <label>Bearer Token</label>
        <div class="pwd-wrap">
          <input type="password" id="cfg-bearer" placeholder="ABSKYm..." />
          <button class="pwd-toggle" onclick="togglePwd('cfg-bearer', this)">👁</button>
        </div>
      </div>
      <div class="cfg-row">
        <label>x-ns-aig-apikey</label>
        <div class="pwd-wrap">
          <input type="password" id="cfg-apikey" placeholder="eyJhbGci..." />
          <button class="pwd-toggle" onclick="togglePwd('cfg-apikey', this)">👁</button>
        </div>
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Request Options</div>
      <div class="toggle-row">
        <label>Streaming (SSE)</label>
        <label class="toggle">
          <input type="checkbox" id="cfg-stream" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <label>Verify SSL</label>
        <label class="toggle">
          <input type="checkbox" id="cfg-ssl" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="cfg-row">
        <label>System Prompt</label>
        <textarea id="cfg-system" placeholder="You are a helpful assistant..."></textarea>
      </div>
      <div class="cfg-row">
        <label>Max Tokens</label>
        <input type="number" id="cfg-maxtokens" placeholder="1024" />
      </div>
      <div class="cfg-row">
        <label>Temperature</label>
        <input type="number" id="cfg-temp" placeholder="0.7" step="0.1" min="0" max="2" />
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Extra Headers</div>
      <div class="kv-editor" id="extra-headers-editor"></div>
      <button class="kv-add-btn" onclick="addKVRow('extra-headers-editor', 'headers')">+ Add Header</button>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Extra Body Fields</div>
      <div class="kv-editor" id="extra-body-editor"></div>
      <button class="kv-add-btn" onclick="addKVRow('extra-body-editor', 'body')">+ Add Field</button>
    </div>

  </div>

  <div id="sidebar-footer">
    <button class="btn btn-ghost" onclick="openProfiles()">📁 Profiles</button>
    <button class="btn btn-ghost" onclick="testConnection()">⚡ Test</button>
    <button class="btn btn-primary" onclick="saveCurrentProfile()">Save</button>
  </div>
</div>

<!-- ── MAIN ──────────────────────────────── -->
<div id="main">
  <div id="chat-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="model-tag" id="model-display">no model set</span>
      <span style="font-size:11px;color:var(--text-dim);font-family:var(--mono);" id="msg-count">0 messages</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportChat()" title="Export chat">⬇ Export</button>
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑 Clear</button>
    </div>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="es-icon">🔌</div>
      <p>Configure the endpoint and start chatting</p>
    </div>
  </div>

  <div id="input-bar">
    <div id="attached-files"></div>
    <div class="input-row">
      <input type="file" id="file-input" multiple onchange="handleFileSelect(event)" />
      <button id="file-btn" onclick="document.getElementById('file-input').click()" title="Attach file">📎</button>
      <textarea
        id="msg-input"
        placeholder="Type a message… (Shift+Enter for newline)"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- ── PROFILES MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="profiles-modal">
  <div class="modal">
    <h3>💾 Saved Profiles</h3>
    <div class="profiles-list" id="profiles-list"></div>
    <input type="text" class="new-profile-name" id="new-profile-name" placeholder="Profile name (e.g. 'Prod GPT-20B')" />
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeProfiles()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewProfile()">Save Current as Profile</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
const history = [];        // {role, content, files}
let attachedFiles = [];    // {filename, mime_type, base64, size}
let isWaiting = false;

// ── Init ──────────────────────────────────────────
window.addEventListener('load', () => {
  loadLastConfig();
  renderProfiles();
});

// ── Config helpers ──────────────────────────────────────────
function getConfig() {
  return {
    endpoint:     document.getElementById('cfg-endpoint').value.trim(),
    model:        document.getElementById('cfg-model').value.trim(),
    bearer_token: document.getElementById('cfg-bearer').value.trim(),
    api_key:      document.getElementById('cfg-apikey').value.trim(),
    stream:       document.getElementById('cfg-stream').checked,
    ssl_verify:   document.getElementById('cfg-ssl').checked,
    system:       document.getElementById('cfg-system').value.trim(),
    max_tokens:   document.getElementById('cfg-maxtokens').value || null,
    temperature:  document.getElementById('cfg-temp').value || null,
    extra_headers: getKVData('extra-headers-editor'),
    extra_body:   getKVData('extra-body-editor'),
  };
}

function setConfig(cfg) {
  if (!cfg) return;
  document.getElementById('cfg-endpoint').value    = cfg.endpoint    || '';
  document.getElementById('cfg-model').value       = cfg.model       || '';
  document.getElementById('cfg-bearer').value      = cfg.bearer_token|| '';
  document.getElementById('cfg-apikey').value      = cfg.api_key     || '';
  document.getElementById('cfg-stream').checked    = cfg.stream      || false;
  document.getElementById('cfg-ssl').checked       = cfg.ssl_verify  || false;
  document.getElementById('cfg-system').value      = cfg.system      || '';
  document.getElementById('cfg-maxtokens').value   = cfg.max_tokens  || '';
  document.getElementById('cfg-temp').value        = cfg.temperature || '';
  rebuildKV('extra-headers-editor', cfg.extra_headers || {}, 'headers');
  rebuildKV('extra-body-editor',    cfg.extra_body    || {}, 'body');
  updateModelDisplay();
}

function loadLastConfig() {
  const raw = localStorage.getItem('aig_last_config');
  if (raw) { try { setConfig(JSON.parse(raw)); } catch(e) {} }
  updateModelDisplay();
}

function saveCurrentConfig() {
  localStorage.setItem('aig_last_config', JSON.stringify(getConfig()));
  updateModelDisplay();
}

function updateModelDisplay() {
  const m = document.getElementById('cfg-model').value.trim() || 'no model set';
  document.getElementById('model-display').textContent = m;
}
document.getElementById('cfg-model').addEventListener('input', updateModelDisplay);

// ── KV Editor ──────────────────────────────────────────
function addKVRow(editorId, type, k='', v='') {
  const editor = document.getElementById(editorId);
  const row = document.createElement('div');
  row.className = 'kv-row';
  row.innerHTML = `
    <input type="text"  placeholder="key"   value="${escHtml(k)}" data-role="key" style="flex:.9" />
    <input type="text"  placeholder="value" value="${escHtml(v)}" data-role="val" />
    <button onclick="this.parentElement.remove()">✕</button>
  `;
  editor.appendChild(row);
}

function getKVData(editorId) {
  const obj = {};
  document.querySelectorAll(`#${editorId} .kv-row`).forEach(row => {
    const k = row.querySelector('[data-role=key]').value.trim();
    const v = row.querySelector('[data-role=val]').value.trim();
    if (k) obj[k] = v;
  });
  return obj;
}

function rebuildKV(editorId, obj, type) {
  const editor = document.getElementById(editorId);
  editor.innerHTML = '';
  Object.entries(obj).forEach(([k,v]) => addKVRow(editorId, type, k, v));
}

// ── Profiles ──────────────────────────────────────────
function getProfiles() {
  try { return JSON.parse(localStorage.getItem('aig_profiles') || '[]'); } catch(e) { return []; }
}
function saveProfiles(profiles) {
  localStorage.setItem('aig_profiles', JSON.stringify(profiles));
}

function openProfiles() {
  renderProfiles();
  document.getElementById('profiles-modal').classList.add('open');
}
function closeProfiles() {
  document.getElementById('profiles-modal').classList.remove('open');
}

function renderProfiles() {
  const list = document.getElementById('profiles-list');
  const profiles = getProfiles();
  list.innerHTML = '';
  if (!profiles.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;font-family:var(--mono);text-align:center;padding:12px 0;">No saved profiles</div>';
    return;
  }
  profiles.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'profile-item';
    item.innerHTML = `
      <div>
        <div class="pname">${escHtml(p.name)}</div>
        <div class="pmodel">${escHtml(p.config.model || 'no model')}</div>
      </div>
      <button class="p-del" onclick="deleteProfile(${i}, event)" title="Delete">✕</button>
    `;
    item.addEventListener('click', () => { setConfig(p.config); saveCurrentConfig(); closeProfiles(); });
    list.appendChild(item);
  });
}

function saveNewProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { document.getElementById('new-profile-name').focus(); return; }
  const profiles = getProfiles();
  profiles.push({ name, config: getConfig() });
  saveProfiles(profiles);
  document.getElementById('new-profile-name').value = '';
  renderProfiles();
}

function saveCurrentProfile() {
  saveCurrentConfig();
  showSystemMsg('⚡ Config saved');
}

function deleteProfile(i, e) {
  e.stopPropagation();
  const profiles = getProfiles();
  profiles.splice(i, 1);
  saveProfiles(profiles);
  renderProfiles();
}

// ── Connection test ──────────────────────────────────────────
async function testConnection() {
  const cfg = getConfig();
  if (!cfg.endpoint) { showSystemMsg('⚠ No endpoint configured'); return; }
  setConnStatus('pending');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        config: cfg,
        messages: [{ role: 'user', content: 'ping' }],
        stream: false
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    setConnStatus(data.status < 400 ? 'ok' : 'err');
    showSystemMsg(`⚡ HTTP ${data.status}`);
  } catch(e) {
    setConnStatus('err');
    showSystemMsg(`✕ ${e.message}`);
  }
}

function setConnStatus(state) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  dot.className = 'conn-dot ' + (state === 'ok' ? 'ok' : state === 'err' ? 'err' : '');
  lbl.textContent = state === 'ok' ? 'connected' : state === 'err' ? 'error' : 'testing…';
}

// ── File handling ──────────────────────────────────────────
async function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  for (const f of files) {
    const fd = new FormData();
    fd.append('file', f);
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.error) {
      attachedFiles.push(data);
      renderAttached();
    }
  }
  e.target.value = '';
}

function renderAttached() {
  const bar = document.getElementById('attached-files');
  bar.innerHTML = '';
  attachedFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'attached-chip';
    chip.innerHTML = `📄 ${escHtml(f.filename)} <span style="color:var(--text-dim)">(${fmtSize(f.size)})</span>
      <button onclick="removeFile(${i})">✕</button>`;
    bar.appendChild(chip);
  });
}

function removeFile(i) {
  attachedFiles.splice(i, 1);
  renderAttached();
}

// ── Messaging ──────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function sendMessage() {
  if (isWaiting) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !attachedFiles.length) return;

  const cfg = getConfig();
  if (!cfg.endpoint) { showSystemMsg('⚠ Set an endpoint in the config panel'); return; }

  // Build content
  let content = text;
  const files = [...attachedFiles];
  attachedFiles = [];
  renderAttached();
  input.value = '';
  input.style.height = 'auto';

  // Add to history
  history.push({ role: 'user', content: text, files });
  updateMsgCount();

  // Render user bubble
  const emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  renderUserMsg(text, files);

  // Build messages array for API
  const messages = buildMessages(cfg.system);

  // Show typing indicator
  const typingEl = addTypingIndicator();
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const extraBody = {};
    if (cfg.max_tokens) extraBody.max_output_tokens = parseInt(cfg.max_tokens);
    if (cfg.temperature) extraBody.temperature = parseFloat(cfg.temperature);

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        config: { ...cfg, extra_body: { ...cfg.extra_body, ...extraBody } },
        messages,
        stream: cfg.stream
      })
    });

    typingEl.remove();

    if (cfg.stream) {
      await handleStream(res);
    } else {
      const data = await res.json();
      handleResponse(data);
    }
  } catch(e) {
    typingEl.remove();
    setConnStatus('err');
    appendAssistantMsg(`Error: ${e.message}`, null, true);
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
  saveCurrentConfig();
}

function buildMessages(systemPrompt) {
  const msgs = [];
  if (systemPrompt) {
    msgs.push({ role: 'system', content: systemPrompt });
  }
  history.forEach(h => {
    if (h.files && h.files.length) {
      const parts = [];
      h.files.forEach(f => {
        if (f.mime_type.startsWith('image/')) {
          parts.push({ type: 'image_url', image_url: { url: `data:${f.mime_type};base64,${f.base64}` } });
        } else {
          parts.push({ type: 'text', text: `[File: ${f.filename}]\n${atob(f.base64)}` });
        }
      });
      if (h.content) parts.push({ type: 'text', text: h.content });
      msgs.push({ role: h.role, content: parts });
    } else {
      msgs.push({ role: h.role, content: h.content });
    }
  });
  return msgs;
}

function handleResponse(data) {
  const raw = JSON.stringify(data.body, null, 2);
  let text = '';
  let isErr = data.status >= 400;

  if (!isErr && data.body) {
    // Try OpenAI-style response format
    const body = data.body;
    if (body.output) {
      // Responses API format
      for (const item of body.output) {
        if (item.type === 'message') {
          for (const c of item.content || []) {
            if (c.type === 'output_text') text += c.text;
          }
        }
      }
    } else if (body.choices) {
      // Chat completions format
      text = body.choices[0]?.message?.content || '';
    } else if (body.content) {
      text = Array.isArray(body.content) ? body.content.map(c=>c.text||'').join('') : body.content;
    } else {
      text = raw;
    }
  } else {
    text = raw;
  }

  setConnStatus(isErr ? 'err' : 'ok');
  history.push({ role: 'assistant', content: text });
  updateMsgCount();
  appendAssistantMsg(text, raw, isErr, data.status);
}

async function handleStream(res) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let bubble = null;

  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.innerHTML = '<div class="msg-role">assistant</div>';
  const b = document.createElement('div');
  b.className = 'msg-bubble';
  wrapper.appendChild(b);
  document.getElementById('messages').appendChild(wrapper);
  bubble = b;
  scrollBottom();

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split('\n');
    for (const line of lines) {
      if (!line.startsWith('data:')) continue;
      const payload = line.slice(5).trim();
      if (payload === '[DONE]') break;
      try {
        const obj = JSON.parse(payload);
        const delta = obj.choices?.[0]?.delta?.content
          || obj.output?.[0]?.content?.[0]?.text
          || '';
        if (delta) { fullText += delta; bubble.textContent = fullText; scrollBottom(); }
      } catch(e) {}
    }
  }

  if (!fullText) fullText = '(stream ended — no text received)';
  history.push({ role: 'assistant', content: fullText });
  updateMsgCount();
  setConnStatus('ok');
}

// ── DOM helpers ──────────────────────────────────────────
function renderUserMsg(text, files) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  let html = '<div class="msg-role">you</div>';
  files.forEach(f => {
    html += `<div class="msg-file-preview"><span class="file-icon">📄</span><span>${escHtml(f.filename)}</span><span style="color:var(--text-dim);font-size:10px">${fmtSize(f.size)}</span></div>`;
  });
  if (text) html += `<div class="msg-bubble">${escHtml(text)}</div>`;
  wrap.innerHTML = html;
  msgs.appendChild(wrap);
  scrollBottom();
}

function appendAssistantMsg(text, raw, isErr, status) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';

  const uid = 'raw_' + Date.now();
  const chip = isErr
    ? `<span class="status-chip err">HTTP ${status || 'ERR'}</span>`
    : `<span class="status-chip ok">HTTP ${status || '200'}</span>`;

  wrap.innerHTML = `
    <div class="msg-role">assistant</div>
    <div class="msg-bubble">${escHtml(text)}</div>
    ${raw ? `<div class="msg-meta">
      ${chip}
      <button class="toggle-raw" onclick="toggleRaw('${uid}')">raw JSON</button>
    </div>
    <div class="raw-panel" id="${uid}">${escHtml(raw)}</div>` : ''}
  `;
  msgs.appendChild(wrap);
  scrollBottom();
}

function addTypingIndicator() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.innerHTML = `<div class="msg-role">assistant</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  msgs.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function showSystemMsg(text) {
  const msgs = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg system';
  wrap.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
  msgs.appendChild(wrap);
  scrollBottom();
}

function toggleRaw(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function updateMsgCount() {
  document.getElementById('msg-count').textContent =
    `${history.length} message${history.length !== 1 ? 's' : ''}`;
}

// ── Chat actions ──────────────────────────────────────────
function clearChat() {
  history.length = 0;
  attachedFiles = [];
  renderAttached();
  updateMsgCount();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div id="empty-state">
    <div class="es-icon">🔌</div>
    <p>Configure the endpoint and start chatting</p>
  </div>`;
}

function exportChat() {
  const lines = history.map(h => `[${h.role.toUpperCase()}]\n${h.content}\n`);
  const blob = new Blob([lines.join('\n---\n\n')], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `chat-export-${Date.now()}.txt`; a.click();
}

// ── Misc utils ──────────────────────────────────────────
function togglePwd(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}
